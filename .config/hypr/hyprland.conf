# Appearance
general {
    gaps_in = 2
    gaps_out = 2
    border_size = 2
    col.active_border = rgb(C8507A)
    col.inactive_border = rgb(80485E)
    resize_on_border = true
}

decoration {
    rounding = 3
}

animations {
    enabled = yes
    bezier = easeOutCubic, 0.25, 0.46, 0.45, 0.94
    animation = windows, 1, 4, easeOutCubic, gnomed
    animation = windowsOut, 1, 4, easeOutCubic, gnomed
}

# VRR
misc {
    vrr = 2
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# Monitor config, replace the monitors with your monitor names and uncomment
#monitor = HDMI-A-2, 1920x1080@120, 0x0, 1
#monitor = HDMI-A-1, 1920x1080@120, 1920x0, 1
#Env
env = QT_QPA_PLATFORMTHEME,qt6ct
env = TERMINAL,kitty
env = GTK_CSD,0
env = GTK_THEME,Catppuccin-Dark
# Autostart
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = ~/.local/share/scripts/multimonwallpapers.sh
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = gnome-keyring-daemon --start --components=secrets --unlock
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun
$browser = google-chrome-stable
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, M, exec, hyprshutdown
bind = $mainMod, E, exec, $fileManager --new-window
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy
bind = $mainMod, R, exec, $menu
bind = $mainMod, F, fullscreen
bind = $mainMod, B, exec, $browser --new-window
bind = $mainMod, W, exec, /bin/bash -c 'pkill swaybg; ~/.local/share/scripts/multimonwallpapers.sh
bind = $mainMod, P, exec, hyprpicker -a -n
bind = $mainMod, X, togglefloating
# Pin workspaces to monitors, change the monitor names to your chosen one and uncomment the lines
#workspace = 1, monitor:HDMI-A-2, persistent:true
#workspace = 2, monitor:HDMI-A-2, persistent:true
#workspace = 3, monitor:HDMI-A-2, persistent:true
#workspace = 4, monitor:HDMI-A-2, persistent:true
#workspace = 5, monitor:HDMI-A-2, persistent:true
#workspace = 6, monitor:HDMI-A-1, persistent:true
#workspace = 7, monitor:HDMI-A-1, persistent:true
#workspace = 8, monitor:HDMI-A-1, persistent:true
#workspace = 9, monitor:HDMI-A-1, persistent:true
#workspace = 10, monitor:HDMI-A-1, persistent:true

# Workspace switching, I highly recommend lowering the amount to 5 workspaces, if you have a small screen.
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move windows to workspaces, if you reduced to 5 above, remove 6 - 10 here.
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# Move windows in tiling layout
bind = $mainMod, left, movewindow, l
bind = $mainMod, down, movewindow, d
bind = $mainMod, up, movewindow, u
bind = $mainMod, right, movewindow, r

# Screenshots (hyprshot)
bind = , Print, exec, hyprshot -m region
bind = SHIFT, Print, exec, hyprshot -m output
bind = $mainMod, Print, exec, hyprshot -m window

# Volume
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume --limit 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# Lock Screen
bind = $mainMod, L, exec, hyprlock

