background {
    monitor =
    path = /home/michael-scott/Documents/Wallpapers/Cressida.jpg
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%I:%M %p' | sed 's/^0//')"
    color = rgba(255, 255, 255, 0.85)
    font_size = 96
    font_family = Inter
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:3600000] echo "$(date '+%A, %B %d')"
    color = rgba(255, 255, 255, 0.7)
    font_size = 20
    font_family = Inter
    position = 0, 50
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 60
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(255, 20, 147, 0.6)
    inner_color = rgba(10, 10, 20, 0.5)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    rounding = 12
    placeholder_text = <span foreground='##ff1493'></span>  Unlock
    hide_input = false
    position = 0, -40
    halign = center
    valign = center
}
